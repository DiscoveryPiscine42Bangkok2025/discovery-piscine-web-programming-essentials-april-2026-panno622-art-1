<!DOCTYPE html>
<html>
<head>
    
    <style>
        /* เพิ่ม CSS เพื่อให้เห็นเส้นขอบตารางชัดเจน */
        table {
            background-color: brown;
            width: 100%;
            border-collapse: collapse; /* ทำให้เส้นขอบรวมกันเป็นเส้นเดียว */
        }
        table, th, td {
            border: 4px solid black; /* สร้างเส้นขอบสีดำ */
        }
        th, td {
        
            padding: 60px; /* เพิ่มพื้นที่ว่างในช่อง */
            text-align: left; /* จัดตัวอักษรชิดซ้าย */
        }
    </style>
</head>
<body>

<table>
  <tr>
    <th>star</th>
    <th>sea</th>
  </tr>
  
</table>

</body>
</html>
