<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Do List - jQuery Edition</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #ft_list div {
            border: 2px solid #333;
            padding: 15px;
            margin: 10px 0;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        #ft_list div:hover {
            background-color: #ffcccc;
        }
    </style>
</head>
<body>

    <button id="new">New</button>
    <div id="ft_list"></div>

    <script src="todo.js"></script>
</body>
</html>
